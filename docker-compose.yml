services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ${COMPOSE_PROJECT_NAME:-smartbis}_qdrant
    ports:
      - "127.0.0.1:${QDRANT_PORT:-6333}:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage
    restart: always

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-smartbis}_bot
    ports:
      - "127.0.0.1:${BOT_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - QDRANT_URL=http://qdrant:6333
      - TZ=America/Hermosillo
      - APP_NAME=${APP_NAME:-SmartBis}
      - ITEM_NAME=${ITEM_NAME:-Cursos/Productos}
      - TICKET_PREFIX=${TICKET_PREFIX:-SB-}
    volumes:
      - ./notebook:/app/notebook
      - ./soul:/app/soul
      - ./soul-agent:/app/soul-agent
      - ./data:/app/data
      - ./data/baileys_auth:/app/data/baileys_auth
      - ./src:/app/src
    depends_on:
      - qdrant
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-smartbis}_frontend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-4173}:4173"
    environment:
      - FRONTEND_PORT=4173
      - FRONTEND_QDRANT_URL=http://qdrant:6333
      - FRONTEND_QDRANT_API_KEY=${FRONTEND_QDRANT_API_KEY:-}
      - METRICS_API_BASE=${METRICS_API_BASE:-}
      - BOT_BASE_URL=http://bot:3000
      - APP_NAME=${APP_NAME:-SmartBis}
      - APP_LOGO=${APP_LOGO:-/img/logo.png}
    volumes:
      - ./frontend/public:/app/public
      - ./frontend/data:/app/data
    depends_on:
      - bot
      - qdrant
    restart: always

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ${COMPOSE_PROJECT_NAME:-smartbis}_tunnel
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared
    depends_on:
      - frontend
      - bot
    restart: always
