<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBis | WhatsApp Bridge</title>
    <link rel="icon" href="/img/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/dashboard.css?v=6.0">
    <script>
        if (sessionStorage.getItem('sb_session') !== 'active') {
            window.location.href = '/';
        }
    </script>
    <style>
        .app-status.offline::before {
            background: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }

        .app-status.offline {
            color: #f87171;
            background: rgba(239, 68, 68, 0.05);
            border-color: rgba(239, 68, 68, 0.1);
        }

        .app-viewport {
            grid-template-columns: 1fr;
            gap: 20px;
            margin: 12px 20px;
            height: calc(100vh - 110px);
            display: grid;
        }

        .app-viewport.connected {
            grid-template-columns: 350px 1fr;
        }

        .scroll-area {
            padding: 15px;
        }

        .disconnect-btn {
            width: 100%;
            height: 38px;
            padding: 0;
            margin-top: 10px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .disconnect-btn:hover {
            background: #ef4444;
            color: #fff;
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3);
        }

        #qr-frame {
            width: 350px;
            height: 350px;
        }

        /* Admin Management */
        .admin-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .admin-item .number {
            font-size: 13px;
            color: var(--text-bright);
            font-weight: 600;
        }

        .admin-item .remove-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: 0.2s;
            font-size: 14px;
        }

        .admin-item .remove-btn:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        .add-admin-box {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .add-admin-box input {
            flex: 1;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            color: white;
            font-family: 'Outfit', sans-serif;
            outline: none;
        }

        .add-admin-box input:focus {
            border-color: var(--accent-primary);
        }

        /* Ticket Monitor */
        .ticket-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ticket-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 16px;
            display: grid;
            grid-template-columns: 100px 1fr 120px 100px 40px;
            align-items: center;
            gap: 15px;
            transition: 0.2s;
        }

        .ticket-card:hover {
            border-color: rgba(16, 185, 129, 0.3);
            background: rgba(255, 255, 255, 0.04);
        }

        .tk-id {
            font-family: 'Outfit';
            font-weight: 800;
            color: var(--accent-primary);
            font-size: 13px;
        }

        .tk-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .tk-info .main {
            color: var(--text-bright);
            font-size: 13px;
            font-weight: 600;
        }

        .tk-info .sub {
            color: var(--text-dim);
            font-size: 11px;
        }

        .status-pill {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
        }

        .status-pendiente_pago {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }

        .status-registrado {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }

        .status-aprobado {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }

        .status-rechazado {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .status-pendiente_datos {
            background: rgba(168, 85, 247, 0.15);
            color: #a855f7;
        }

        .type-tag {
            font-size: 10px;
            color: var(--text-dim);
            font-weight: 600;
            text-transform: uppercase;
        }

        .delete-tk-btn {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-tk-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body class="metrics-body dashboard-view">
    <header class="app-header">
        <div class="logo-area" style="display: flex; align-items: center; gap: 12px;">
            <div class="logo-box"><img src="/img/logo.png" alt="Logo" class="app-logo-img"></div>
            <div class="title-box">
                <h1 class="glow-text"
                    style="font-size: 26px; margin: 0; background: linear-gradient(to right, #008BCF, #ffffff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; letter-spacing: -1px;">
                    SmartBis</h1>
            </div>
        </div>
        <nav class="app-nav"
            style="display: flex; gap: 8px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
            <button class="nav-btn" onclick="window.location.href='/dashboard.html'">
                <span class="icon">💬</span> CHATS
            </button>
            <button class="nav-btn active" onclick="window.location.href='/whatsapp.html'">
                <span class="icon">📱</span> WHATSAPP
            </button>
            <button class="nav-btn" onclick="window.location.href='/calendario.html'">
                <span class="icon">📅</span> CALENDARIO
            </button>
        </nav>

        <div class="header-actions" style="display: flex; align-items: center; gap: 20px;">
            <div class="bot-switches"
                style="display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.3); padding: 6px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);">
                <!-- Messenger Switch -->
                <div class="switch-group" style="display: flex; align-items: center; gap: 8px;">
                    <span style="font-size: 10px; font-weight: 800; color: #3b82f6;">MESSENGER</span>
                    <label class="sb-switch">
                        <input type="checkbox" id="messengerStatus"
                            onchange="toggleBotStatus('messenger', this.checked)">
                        <span class="sb-slider messenger"></span>
                    </label>
                </div>
                <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.1);"></div>
                <!-- WhatsApp Switch -->
                <div class="switch-group" style="display: flex; align-items: center; gap: 8px;">
                    <span style="font-size: 10px; font-weight: 800; color: #10b981;">WHATSAPP</span>
                    <label class="sb-switch">
                        <input type="checkbox" id="whatsappStatus" onchange="toggleBotStatus('whatsapp', this.checked)">
                        <span class="sb-slider whatsapp"></span>
                    </label>
                </div>
            </div>
            <div id="wa-pill" class="app-status offline">Cargando...</div>

            <button onclick="sessionStorage.clear(); window.location.href='/';" class="logout-btn">Salir</button>
        </div>
    </header>

    <!-- Generic functions for switches since we don't have app.js here -->
    <script>
        async function fetchStatusToggle() {
            try {
                const r = await fetch("/api/bot/status");
                const s = await r.json();
                document.getElementById("messengerStatus").checked = s.messenger;
                document.getElementById("whatsappStatus").checked = s.whatsapp;
            } catch (e) { }
        }
        async function toggleBotStatus(platform, status) {
            try {
                await fetch("/api/bot/status", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ platform, status })
                });
            } catch (e) { fetchStatusToggle(); }
        }
        fetchStatusToggle();
    </script>

    <main id="main-viewport" class="app-viewport">
        <!-- VISTA DESCONECTADO (QR) -->
        <section id="qr-panel" class="app-panel" style="max-width: 650px; margin: 40px auto;">
            <div class="panel-header" style="justify-content: center; padding: 16px 20px;">
                <h2 style="font-size: 13px;">🔗 Enlazar WhatsApp</h2>
            </div>
            <div class="scroll-area"
                style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; padding: 40px;">
                <div id="qr-frame"
                    style="position: relative; padding: 15px; background: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(16, 185, 129, 0.1);">
                    <div id="qr-loader" style="color: #64748b; font-size: 12px; text-align: center;">Iniciando motor...
                    </div>
                    <img id="qr-img" style="display: none; width: 100%; height: 100%;">
                </div>
                <div style="text-align: center;">
                    <h3 id="wa-status-title" style="margin-bottom: 8px; font-size: 16px; color: white;">Escanea el
                        código</h3>
                    <p id="wa-status-desc" style="font-size: 12px; color: #64748b; max-width: 280px;">Abre WhatsApp en
                        tu teléfono, ve a Dispositivos vinculados y escanea el código.</p>
                </div>
            </div>
        </section>

        <!-- VISTA CONECTADO (Admin numbers) -->
        <aside id="admin-panel" class="app-panel hidden">
            <div class="panel-header" style="padding: 16px 20px;">
                <h2 style="font-size: 13px;">🛡️ Administradores</h2>
            </div>
            <div class="scroll-area">
                <div class="add-admin-box">
                    <input type="text" id="new-admin-phone" placeholder="+52 1 662 ...">
                    <button class="primary-btn" onclick="addAdmin()" style="width: 50px; height: 38px;">+</button>
                </div>
                <div id="admins-list">
                    <!-- Admins here -->
                </div>
                <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-light);">
                    <button onclick="testConnection()" class="primary-btn" style="width: 100%;">PROBAR CONEXIÓN</button>
                    <button onclick="disconnectWA()" class="disconnect-btn">⚡ DESCONECTAR</button>
                </div>
            </div>
        </aside>

        <!-- VISTA CONECTADO (Monitor de Tickets) -->
        <section id="monitor-panel" class="app-panel hidden">
            <div class="panel-header"
                style="padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;">
                <h2 style="font-size: 13px;">📺 Monitor de Tickets</h2>
                <div style="font-size: 10px; color: var(--text-dim);">Actualización automática cada 5s</div>
            </div>
            <div
                style="padding: 0 20px 15px 20px; display: flex; gap: 15px; border-bottom: 1px solid var(--border-light); flex-wrap: wrap;">
                <input type="text" id="tk-search" placeholder="🔍 Buscar por nombre o concepto..."
                    oninput="renderTickets()"
                    style="flex: 1; min-width: 200px; padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border-light); background: rgba(255,255,255,0.05); color: white; outline: none; font-size: 14px;">
                <select id="tk-filter-type" onchange="renderTickets()"
                    style="padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border-light); background: var(--bg-deep); color: white; outline: none; cursor: pointer; min-width: 150px; font-size: 14px;">
                    <option value="">Todos los tipos</option>
                    <option value="inscripcion">Inscripciones</option>
                    <option value="cita">Citas</option>
                    <option value="compra">Pedidos / Compras</option>
                </select>
                <select id="tk-filter-status" onchange="renderTickets()"
                    style="padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border-light); background: var(--bg-deep); color: white; outline: none; cursor: pointer; min-width: 150px; font-size: 14px;">
                    <option value="">Todos los estatus</option>
                    <option value="paid">PAGADOS</option>
                    <option value="unpaid">NO PAGADOS (Pendientes)</option>
                </select>
            </div>
            <div class="scroll-area">
                <div id="ticket-monitor" class="ticket-list">
                    <!-- Tickets here -->
                </div>
            </div>
        </section>

        <!-- MODAL DE DETALLE DE TICKET -->
        <div id="ticketModal"
            style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 2000; align-items: center; justify-content: center; display: none;">
            <div
                style="background: var(--bg-deep); border: 1px solid var(--border-light); border-radius: 20px; width: 90%; max-width: 500px; padding: 24px; position: relative;">
                <button onclick="document.getElementById('ticketModal').style.display = 'none'"
                    style="position: absolute; right: 15px; top: 15px; background: none; border: none; font-size: 20px; color: var(--text-dim); cursor: pointer;">✕</button>
                <h2 id="modalTkId" style="font-size: 18px; color: var(--accent-primary); margin-bottom: 15px;">#TK-000
                </h2>
                <div id="modalTkBody"
                    style="font-size: 14px; color: white; display: flex; flex-direction: column; gap: 10px; max-height: 70vh; overflow-y: auto;">
                    <!-- Info here -->
                </div>
            </div>
        </div>
    </main>

    <script>
        let adminNumbers = [];
        let isConnected = false;
        let globalTickets = [];

        async function api(path, options = {}) {
            const r = await fetch(path, options);
            return r.json();
        }

        async function loadConfig() {
            const data = await api('/api/whatsapp/config');
            adminNumbers = data.adminNumbers || [];
            renderAdmins();
        }

        function renderAdmins() {
            const list = document.getElementById('admins-list');
            if (adminNumbers.length === 0) {
                list.innerHTML = '<div style="text-align: center; padding: 20px; color: #64748b; font-size: 12px;">No hay administradores configurados.</div>';
                return;
            }
            list.innerHTML = adminNumbers.map((num, i) => `
                <div class="admin-item">
                    <span class="number">${num}</span>
                    <button class="remove-btn" onclick="removeAdmin(${i})">✕</button>
                </div>
            `).join('');
        }

        async function addAdmin() {
            const input = document.getElementById('new-admin-phone');
            const phone = input.value.trim();
            if (!phone) return;
            if (!adminNumbers.includes(phone)) {
                adminNumbers.push(phone);
                await saveAdminConfig(false); // Silent save
                renderAdmins();
            }
            input.value = '';
        }

        async function removeAdmin(index) {
            adminNumbers.splice(index, 1);
            await saveAdminConfig(false); // Silent save
            renderAdmins();
        }

        async function saveAdminConfig(showSuccess = true) {
            try {
                await api('/api/whatsapp/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminNumbers })
                });
                if (showSuccess) alert("Configuración guardada.");
            } catch (e) { console.error("Error saving config"); }
        }

        async function testConnection() {
            try {
                const test = await api('/api/whatsapp/test');
                alert(test.message);
            } catch (e) { alert("Error al probar conexión."); }
        }

        async function fetchStatus() {
            const data = await api('/api/whatsapp/status');
            const viewport = document.getElementById('main-viewport');
            const pill = document.getElementById('wa-pill');
            const qrPanel = document.getElementById('qr-panel');
            const adminPanel = document.getElementById('admin-panel');
            const monitorPanel = document.getElementById('monitor-panel');
            const qimg = document.getElementById('qr-img');
            const loader = document.getElementById('qr-loader');

            pill.textContent = data.status === 'CONNECTED' ? 'Conectado' : 'Desconectado';
            pill.className = data.status === 'CONNECTED' ? 'app-status online' : 'app-status offline';

            if (data.status === 'CONNECTED') {
                viewport.classList.add('connected');
                qrPanel.classList.add('hidden');
                adminPanel.classList.remove('hidden');
                monitorPanel.classList.remove('hidden');
                if (!isConnected) {
                    isConnected = true;
                    fetchTickets();
                }
            } else {
                viewport.classList.remove('connected');
                qrPanel.classList.remove('hidden');
                adminPanel.classList.add('hidden');
                monitorPanel.classList.add('hidden');
                isConnected = false;

                if (data.qr) {
                    qimg.src = data.qr;
                    qimg.style.display = 'block';
                    loader.style.display = 'none';
                }
            }
        }

        async function fetchTickets() {
            if (!isConnected) return;
            try {
                const data = await api('/api/tickets');
                globalTickets = data.items || [];
                renderTickets();
            } catch (e) { console.error("Error fetching tickets:", e); }
        }

        function renderTickets() {
            const monitor = document.getElementById('ticket-monitor');
            let tickets = globalTickets;

            // Filtro de Texto
            const searchVal = document.getElementById('tk-search')?.value.toLowerCase() || '';
            if (searchVal) {
                tickets = tickets.filter(t => {
                    const concept = (t.data.curso || t.data.productos || t.data.motivo || t.type).toLowerCase();
                    const name = (t.data.nombre || '').toLowerCase();
                    return name.includes(searchVal) || concept.includes(searchVal);
                });
            }

            // Filtro de Tipo
            const typeVal = document.getElementById('tk-filter-type')?.value;
            if (typeVal) {
                // "inscripcion", "cita", "compra"
                tickets = tickets.filter(t => t.type === typeVal);
            }

            // Filtro de Estatus de Pago
            const statusVal = document.getElementById('tk-filter-status')?.value;
            if (statusVal) {
                tickets = tickets.filter(t => {
                    const isPaid = (t.status === 'registrado' || t.status === 'aprobado' || t.status === 'registrado_pago');
                    if (statusVal === 'paid') return isPaid;
                    if (statusVal === 'unpaid') return !isPaid;
                    return true;
                });
            }

            if (tickets.length === 0) {
                monitor.innerHTML = '<div style="text-align: center; padding: 40px; color: #64748b;">No hay tickets que coincidan con los filtros.</div>';
                return;
            }

            monitor.innerHTML = tickets.map(t => {
                const concept = t.data.curso || t.data.productos || t.data.motivo || t.type;
                const isPaid = (t.status === 'registrado' || t.status === 'aprobado' || t.status === 'registrado_pago');
                const paidText = isPaid ? 'PAGADO' : 'NO PAGADO';
                const paidClass = isPaid ? 'status-registrado' : 'status-pendiente_pago';

                return `
                    <div class="ticket-card" style="cursor: pointer;" onclick="openTicketModal('${t.id}')">
                        <div class="tk-id" style="min-width: 120px;">#${t.id}</div>
                        <div class="tk-info">
                            <div class="main">${t.data.nombre || 'Sin nombre'}</div>
                            <div class="sub">${concept}</div>
                        </div>
                        <div class="status-pill ${paidClass}">${paidText}</div>
                        <div class="type-tag">${t.type.toUpperCase()}</div>
                        <button class="delete-tk-btn" onclick="event.stopPropagation(); deleteTicket('${t.id}')" title="Eliminar Ticket">✕</button>
                    </div>
                `;
            }).join('');
        }

        function openTicketModal(id) {
            const t = globalTickets.find(x => x.id === id);
            if (!t) return;

            document.getElementById('modalTkId').textContent = 'Ticket #' + t.id;

            const body = document.getElementById('modalTkBody');
            let html = `
                <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid var(--border-light);">
                    <div style="margin-bottom: 8px;"><strong style="color:var(--text-dim);">Nombre:</strong> ${t.data.nombre || 'N/A'}</div>
                    <div style="margin-bottom: 8px;"><strong style="color:var(--text-dim);">Concepto:</strong> ${t.data.curso || t.data.productos || t.data.motivo || t.type}</div>
                    <div style="margin-bottom: 8px;"><strong style="color:var(--text-dim);">WhatsApp:</strong> ${t.data.whatsapp || 'N/A'}</div>
                    <div style="margin-bottom: 8px;"><strong style="color:var(--text-dim);">Correo:</strong> ${t.data.email || 'N/A'}</div>
                    <div style="margin-bottom: 8px;"><strong style="color:var(--text-dim);">Ubicación:</strong> ${t.data.localidad || 'N/A'} ${t.data.tipo_entrega ? `(${t.data.tipo_entrega})` : ''}</div>
            `;

            if (t.data.modalidad) html += `<div style="margin-bottom: 8px;"><strong style="color:var(--text-dim);">Modalidad:</strong> ${t.data.modalidad}</div>`;
            if (t.data.fecha && t.data.horario) html += `<div style="margin-bottom: 8px;"><strong style="color:var(--text-dim);">Horario Cita:</strong> ${t.data.fecha} ${t.data.horario}</div>`;
            if (t.data.monto) html += `<div style="margin-bottom: 8px;"><strong style="color:var(--text-dim);">Monto:</strong> ${t.data.monto}</div>`;
            if (t.data.metodo_pago) html += `<div style="margin-bottom: 8px;"><strong style="color:var(--text-dim);">Método:</strong> ${t.data.metodo_pago}</div>`;

            html += `</div>`;

            if (t.data.comprobante_url) {
                html += `<div style="margin-top: 15px; text-align: center;">
                    <p style="font-size: 12px; color: var(--text-dim); margin-bottom: 8px;">Comprobante / Ticket adjunto</p>
                    <a href="${t.data.comprobante_url}" target="_blank">
                        <img src="${t.data.comprobante_url}" style="max-width: 100%; max-height: 250px; border-radius: 10px; border: 1px solid var(--border-light); object-fit: contain;" onerror="this.style.display='none'">
                    </a>
                </div>`;
            }

            body.innerHTML = html;
            document.getElementById('ticketModal').style.display = 'flex';
        }

        async function deleteTicket(id) {
            if (!confirm(`¿Eliminar ticket #${id}?`)) return;
            try {
                await api(`/api/tickets/${id}`, { method: 'DELETE' });
                fetchTickets();
            } catch (e) { alert("Error al eliminar ticket."); }
        }

        async function disconnectWA() {
            if (!confirm('¿Desconectar sesión de WhatsApp?')) return;
            await api('/api/whatsapp/logout', { method: 'POST' });
            fetchStatus();
        }

        setInterval(fetchStatus, 3000);
        setInterval(fetchTickets, 5000);
        fetchStatus();
        loadConfig();
    </script>
</body>

</html>
