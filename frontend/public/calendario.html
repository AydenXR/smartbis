<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBis | Calendario</title>
    <link rel="icon" href="/img/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/dashboard.css?v=6.0">
    <style>
        .app-panel { overflow: hidden; }
        .scroll-area { 
            overflow: hidden !important; 
            padding: 12px !important;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.015);
        }
        .calendar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100%;
            background: var(--bg-deep);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: 35px repeat(6, 1fr);
            gap: 1.5px;
            margin: 0;
            background: rgba(255,255,255,0.08); /* Border color */
            flex: 1;
            width: 100%;
            height: 100%;
        }
        .day-label {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            background: var(--bg-deep);
        }
        .calendar-day {
            background: var(--bg-deep);
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            cursor: pointer;
            position: relative;
            transition: background 0.2s;
            min-height: 0;
        }
        .calendar-day-header {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-dim);
            margin-bottom: 6px;
            padding-top: 2px;
            text-align: right;
        }
        .calendar-day:nth-child(7n) { border-right: none; }
        .calendar-day:nth-last-child(-n+7) { border-bottom: none; }
        .event-list {
            margin-top: 5px;
            flex: 1;
            overflow-y: auto;
            padding-right: 2px;
        }
        .event-list::-webkit-scrollbar { width: 3px; }
        .today-circle {
            background: var(--accent-primary);
            color: var(--bg-deep) !important;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 800 !important;
        }
        .event-tag {
            font-size: 9px;
            padding: 4px 8px;
            border-radius: 6px;
            margin-bottom: 2px;
            width: 100%;
            text-align: left;
            word-break: break-all;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
        }
        .event-tag span {
            width: 100%;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .event-tag:hover {
            border-color: var(--accent-primary);
            background: rgba(16, 185, 129, 0.1);
        }
        .event-cita {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border-left: 3px solid #10b981;
        }
        .event-curso {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
            border-left: 3px solid #3b82f6;
        }
        .event-inhabil {
            background: rgba(239, 68, 68, 0.15) !important;
            color: #ef4444 !important;
            border-left: 3px solid #ef4444 !important;
            font-weight: 800;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .calendar-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .month-title {
            font-size: 16px;
            font-weight: 600;
            min-width: 140px;
            text-align: center;
            color: var(--accent-primary);
        }
        .legend {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            padding: 10px 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
        }
        .indicator { width: 10px; height: 10px; border-radius: 2px; }
        .delete-event-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            border-radius: 4px;
            width: 18px;
            height: 18px;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 4px;
            align-self: flex-end;
            opacity: 0.5;
            transition: 0.2s;
        }
        .event-tag:hover .delete-event-btn { opacity: 1; }
        .delete-event-btn:hover { background: #ef4444; }
        
        .editor-modal, .view-modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); 
            z-index: 2000; display: none; align-items: center; justify-content: center; 
            animation: fadeIn 0.3s ease;
        }
        .editor-modal.active, .view-modal.active { display: flex; }
        .editor-pane, .view-pane { 
            width: 90%; max-width: 480px; background: var(--bg-deep); border: 1px solid var(--border-light); 
            border-radius: 32px; display: flex; flex-direction: column; overflow: hidden; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }

        .config-group {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .config-title {
            font-size: 10px;
            font-weight: 800;
            color: var(--accent-primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .config-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .field-label {
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 2px;
            display: block;
        }
        .config-pane {
            max-width: 380px;
        }
        .save-btn-wrapper {
            margin-top: 10px;
            padding: 10px;
            background: rgba(16, 185, 129, 0.05);
            border-radius: 20px;
            border: 1px dashed rgba(16, 185, 129, 0.2);
        }
        #calendarConfigForm .app-input { padding: 6px 12px; height: 34px; font-size: 12px; }
    </style>
    <script>
        if (sessionStorage.getItem('sb_session') !== 'active') {
            window.location.href = '/';
        }
    </script>
</head>
<body class="metrics-body config-view">
    <header class="app-header">
        <div class="logo-area" style="display: flex; align-items: center; gap: 12px;">
            <div class="logo-box">
                <img src="/img/logo.png" alt="Logo" class="app-logo-img">
            </div>
            <div class="title-box">
                <h1 class="glow-text" style="font-size: 26px; margin: 0; background: linear-gradient(to right, #008BCF, #ffffff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; letter-spacing: -1px;">SmartBis</h1>
            </div>
        </div>

        <nav class="app-nav" style="display: flex; gap: 8px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
            <button class="nav-btn" onclick="window.location.href='/dashboard.html'">
                <span class="icon">💬</span> CHATS
            </button>
            <button class="nav-btn" onclick="window.location.href='/whatsapp.html'">
                <span class="icon">📱</span> WHATSAPP
            </button>
            <button class="nav-btn active" onclick="window.location.href='/calendario.html'">
                <span class="icon">📅</span> CALENDARIO
            </button>
        </nav>

        <div class="header-actions" style="display: flex; align-items: center; gap: 20px;">
            <div class="bot-switches" style="display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.3); padding: 6px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);">
                <!-- Messenger Switch -->
                <div class="switch-group" style="display: flex; align-items: center; gap: 8px;">
                    <span style="font-size: 10px; font-weight: 800; color: #3b82f6;">MESSENGER</span>
                    <label class="sb-switch">
                        <input type="checkbox" id="messengerStatus" onchange="toggleBotStatus('messenger', this.checked)">
                        <span class="sb-slider messenger"></span>
                    </label>
                </div>
                <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.1);"></div>
                <!-- WhatsApp Switch -->
                <div class="switch-group" style="display: flex; align-items: center; gap: 8px;">
                    <span style="font-size: 10px; font-weight: 800; color: #10b981;">WHATSAPP</span>
                    <label class="sb-switch">
                        <input type="checkbox" id="whatsappStatus" onchange="toggleBotStatus('whatsapp', this.checked)">
                        <span class="sb-slider whatsapp"></span>
                    </label>
                </div>
            </div>
            <button onclick="sessionStorage.clear(); window.location.href='/';" class="logout-btn">Salir</button>
        </div>
    </header>

    <script>
        async function fetchStatusToggle() {
            try {
                const r = await fetch("/api/bot/status");
                const s = await r.json();
                document.getElementById("messengerStatus").checked = s.messenger;
                document.getElementById("whatsappStatus").checked = s.whatsapp;
            } catch(e){}
        }
        async function toggleBotStatus(platform, status) {
            try {
                await fetch("/api/bot/status", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ platform, status })
                });
            } catch(e){ fetchStatusToggle(); }
        }
        fetchStatusToggle();
    </script>

    <main class="app-viewport" style="display: grid; grid-template-columns: 1fr 350px; gap: 20px; height: calc(100vh - 120px); min-height: 600px;">
        <!-- Panel Izquierdo: Calendario -->
        <div class="app-panel" style="display: flex; flex-direction: column; overflow: hidden; height: 100%;">
            <div class="panel-header">
                <h2>CALENDARIO INTERACTIVO</h2>
                <div class="calendar-controls">
                    <button class="ghost-btn" id="prevMonth">◀</button>
                    <div class="month-title" id="monthLabel">Cargando...</div>
                    <button class="ghost-btn" id="nextMonth">▶</button>
                </div>
            </div>
            
            <div class="scroll-area">
                <div class="calendar-wrapper">
                    <div class="calendar-grid" id="calendarBody">
                        <!-- Days and Labels injected via JS -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Panel Derecho: Ajuste de Ventana -->
        <div class="app-panel config-pane" style="max-width: 350px;">
            <div class="panel-header">
                <h2>AJUSTE DE VENTANA</h2>
            </div>
            <div class="scroll-area" style="padding: 20px !important;">
                <form id="calendarConfigForm">
                    <!-- Grupo 1: Horarios de Operación -->
                    <div class="config-group">
                        <div class="config-title">🕒 Horarios de Operación</div>
                        <div class="config-row">
                            <div style="flex: 1;">
                                <label class="field-label">Inicio</label>
                                <input type="time" id="start_time" class="app-input" style="padding: 10px;">
                            </div>
                            <div style="flex: 1;">
                                <label class="field-label">Cierre</label>
                                <input type="time" id="end_time" class="app-input" style="padding: 10px;">
                            </div>
                        </div>
                        <div>
                            <label class="field-label">Sábados Cierran a las:</label>
                            <input type="time" id="saturday_closing" class="app-input" style="padding: 10px;">
                        </div>
                    </div>

                    <!-- Grupo 2: Duración y Espacios -->
                    <div class="config-group">
                        <div class="config-title">⚖️ Reglas de Agenda</div>
                        <div class="config-row">
                            <div style="flex: 1;">
                                <label class="field-label">Cita (min)</label>
                                <input type="number" id="appointment_duration" class="app-input" style="padding: 10px;">
                            </div>
                            <div style="flex: 1;">
                                <label class="field-label">Entre Citas</label>
                                <input type="number" id="buffer_time" class="app-input" style="padding: 10px;">
                            </div>
                        </div>
                    </div>

                    <!-- Grupo 3: Disponibilidad Bot -->
                    <div class="config-group">
                        <div class="config-title">🤖 Inteligencia Bot</div>
                        <div>
                            <label class="field-label">Día de Descanso (0-Dom, 1-Lun...)</label>
                            <input type="text" id="off_day" class="app-input" style="padding: 10px;" placeholder="Ej: 0,6">
                        </div>
                        <div>
                            <label class="field-label">Días a ofrecer a futuro</label>
                            <input type="number" id="days_to_offer" class="app-input" style="padding: 10px;" placeholder="Ej: 3">
                        </div>
                    </div>
                    
                    <div class="save-btn-wrapper">
                        <button type="submit" class="primary-btn" id="saveConfigBtn" style="margin-top: 0;">
                            GUARDAR CONFIGURACIÓN
                        </button>
                    </div>
                    <div id="saveStatus" style="font-size: 11px; margin-top: 10px; text-align: center; color: var(--accent-secondary);"></div>
                </form>
            </div>
        </div>
    </main>
 
    <!-- Modal para Nuevo Evento -->
    <div id="eventModal" class="editor-modal">
        <div class="editor-pane" style="max-height: 90vh;">
            <div class="panel-header">
                <h2>Programar Evento</h2>
            </div>
            <div style="padding: 30px; overflow-y: auto;">
                <form id="eventForm">
                    <div class="form-group">
                        <label>Título / Nombre</label>
                        <input type="text" id="eventTitle" class="app-input" placeholder="Ej: Vuelo, Curso..." required>
                    </div>
                    <div class="form-group">
                        <label>Fecha</label>
                        <input type="date" id="eventDate" class="app-input" required>
                    </div>

                    <div id="customFieldsContainer" style="display: flex; flex-direction: column; gap: 12px; margin-top: 20px;"></div>

                    <div style="margin-top: 20px;">
                        <p style="font-size: 10px; color: var(--text-dim);">Añadir detalles:</p>
                        <div style="display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px;">
                            <button type="button" id="addDesc" class="ghost-btn" style="padding: 5px 10px; font-size: 10px;">+ Descr.</button>
                            <button type="button" id="addPrice" class="ghost-btn" style="padding: 5px 10px; font-size: 10px;">+ Precio</button>
                            <button type="button" id="addMod" class="ghost-btn" style="padding: 5px 10px; font-size: 10px;">+ Mod.</button>
                            <button type="button" id="addOther" class="primary-btn" style="width: auto; padding: 5px 10px; font-size: 10px;">+ Otro</button>
                        </div>
                    </div>
                    
                    <div style="display: flex; gap: 12px; margin-top: 40px;">
                        <button type="button" onclick="window.closeEventModal()" class="ghost-btn" style="flex: 1;">CANCELAR</button>
                        <button type="button" onclick="window.markAsInhabil()" class="ghost-btn" style="flex: 1; border: 1px solid #ef4444; color: #ef4444;">INHÁBIL</button>
                        <button type="submit" class="primary-btn" style="flex: 1;">GUARDAR</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal para Ver Detalles -->
    <div id="viewModal" class="view-modal">
        <div class="view-pane">
            <div class="panel-header" style="justify-content: space-between;">
                <h2 id="viewTitle">Detalles del Evento</h2>
                <button onclick="window.closeViewModal()" class="delete-event-btn" style="width: 30px; height: 30px; font-size: 18px;">×</button>
            </div>
            <div style="padding: 35px; overflow-y: auto;">
                <div id="viewContent"></div>
                <div style="margin-top: 35px;">
                    <button onclick="window.closeViewModal()" class="primary-btn" style="width: 100%;">CERRAR</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/calendario.js"></script>
</body>
</html>
